name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild archive \
            -scheme Whisky \
            -archivePath ${{ runner.temp }}/Rum.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export
        run: |
          mkdir -p ${{ runner.temp }}/export
          cp -R ${{ runner.temp }}/Rum.xcarchive/Products/Applications/Rum.app \
            ${{ runner.temp }}/export/Rum.app

      - name: Zip
        run: |
          cd ${{ runner.temp }}/export
          ditto -c -k --keepParent Rum.app Rum.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/export/Rum.zip
          generate_release_notes: true
